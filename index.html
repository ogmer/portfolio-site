<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/loader.css"/>
    <link rel="shortcut icon" href="img/favicon.png" type="image/png" sizes="16×16" />
    <title>mysite</title>
  </head>

  <body>
    
      <div id="app1">
        <a class="button" v-on:click="show">Skill</a>
        <modal name="modal-1" :adaptable="true" :delay=368>
          <div class="modal-inner">
            <h1>Skill</h1>
            <h2>Languages: C++, PHP</h2>
            <h2>Frameworks: Vue.js</h2> 
            <h2>Databases: MySQL</h2>
            <span class="hide" v-on:click="hide"></span>
          </div>
        </modal>
      </div>

      <div id="app2">
        <a class="button" v-on:click="show">about</a>
        <modal name="modal-2" :adaptive="true" :delay=368>
          <div class="modal-inner">
            <h1>About</h1>
            <p>1995年生まれ25歳</p>
            <p>サイト作ったり、ハード触ってます</p>
            <span class="hide" v-on:click="hide"></span>
          </div>
        </modal>
      </div>

      <div id="app3">
        <a class="button" v-on:click="show">Link</a>
        <modal name="modal-3" :adaptable="true" :delay=368>
          <div class="modal-inner">
            <h1>Link</h1>
            <div class="bold">
              <a href="https://github.com/ogmer">GitHub</a>
              <a href="https://qiita.com/ogmer">Qiita</a>
            </div>
            <span class="hide" v-on:click="hide"></span>
          </div>
        </modal>
      </div>

      <div id="app4">
        <a class="button" v-on:click="show">contact</a>
        <modal name="modal-4" :adaptable="true" :delay=368>
          <div class="modal-inner">
            <h1>Contact</h1>
            <p>watershed〔at〕keemail.me</p>
            <span class="hide" v-on:click="hide"></span>
          </div>
        </modal>
      </div>
    <script src="js/vue-modal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.10/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-js-modal@1.3.28/dist/index.min.js"></script>
    <script src="js/hidden.js"></script>
  </body>
</html>
